# =============================================
# EstudarFatec API — Configurações do Spring Boot
# =============================================

# Nome da aplicação
spring.application.name=estudarfatec

# Porta: o Render injeta a variável PORT automaticamente
# Se não existir (local), usa 8080 como fallback
server.port=${PORT:8080}

# Serialização JSON: não inclui campos null na resposta
spring.jackson.default-property-inclusion=non_null

# Formato de datas no JSON (ISO 8601)
spring.jackson.serialization.write-dates-as-timestamps=false

# Mensagens de erro mais detalhadas (desativar em produção real)
server.error.include-message=always
server.error.include-binding-errors=always
